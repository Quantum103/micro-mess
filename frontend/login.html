<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpine Messenger - Вход</title>
<link rel="stylesheet" href="static/css/login.css">   
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="snow" id="snow"></div>
    <div class="mountains">
        <div class="mountain" style="--scale: 1.1"></div>
        <div class="mountain" style="--scale: 0.85"></div>
        <div class="mountain" style="--scale: 1.2"></div>
        <div class="mountain" style="--scale: 0.9"></div>
    </div>

    <div class="login-container">
        <div style="position: relative; z-index: 2;">
            <div class="snowflake-deco">❄</div>
            <div class="snowflake-deco">❄</div>
        </div>
        
        <div class="login-header">
            <div class="logo">🏔️</div>
            <div class="logo-text">AlpineChat</div>
            <div class="subtitle">Ваш зимний горный мессенджер</div>
        </div>

<form id="loginForm">            
    <div class="form-group">
                <label for="username">Email</label>
                <input 
                    type="text" 
                    id="username" 
                    class="form-control" 
                    placeholder="email@example.com"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">ПАРОЛЬ</label>
                <div style="position: relative;">
                    <input type="password" id="password" class="form-control"  placeholder="••••••••••••••••" required>
                    <button 
                        type="button" 
                        style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--mountain); cursor: pointer; font-size: 16px; opacity: 0.8;"
                        onclick="togglePassword()"
                    >
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="remember-forgot">
                <div class="remember-me" onclick="toggleRemember()">
                    <div class="checkbox" id="rememberCheckbox"></div>
                    <span style="color: var(--mountain); font-size: 13px; letter-spacing: 0.3px;">ЗАПОМНИТЬ МЕНЯ</span>
                </div>
                <a href="#" class="forgot-password" onclick="forgotPassword(event)">ЗАБЫЛИ ПАРОЛЬ?</a>
            </div>

            <button type="submit" class="login-btn" id="loginButton">
                ВОЙТИ В АККАУНТ
            </button>
        </form>

        <div class="divider">
            <span class="divider-text">ИЛИ ВОЙТИ ЧЕРЕЗ</span>
        </div>

        <div class="social-login">
            <button class="social-btn" onclick="socialLogin('Google')">
                <i class="fab fa-google"></i>
                GOOGLE
            </button>
            <button class="social-btn" onclick="socialLogin('Facebook')">
                <i class="fab fa-facebook-f"></i>
                FACEBOOK
            </button>
            <button class="social-btn" onclick="socialLogin('Apple')">
                <i class="fab fa-apple"></i>
                APPLE
            </button>
        </div>
    </div>

<script src="/static/js/login.js"></script>
</body>
</html>
