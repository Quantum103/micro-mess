<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpine Messenger - Настройки</title>
    <link rel="stylesheet" href="static/css/settings.css">   

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Фон -->
    <div class="snow" id="snow"></div>
    <div class="mountains">
        <div class="mountain"></div>
        <div class="mountain"></div>
        <div class="mountain"></div>
        <div class="mountain"></div>
    </div>

    <!-- Кнопка назад -->
    <a href="#" class="back-btn" onclick="history.back()">
        <i class="fas fa-arrow-left"></i> Назад
    </a>

    <!-- Основной контейнер -->
    <div class="settings-container">
        <div class="page-header">
            <h1>НАСТРОЙКИ</h1>
            <p>Управление вашим профилем в Alpine Messenger</p>
        </div>

        <div class="settings-grid">
            
            <!-- БЛОК 1: GEO НАСТРОЙКИ -->
            <div class="setting-card">
                <div class="card-title">
                    <i class="fas fa-map-marker-alt"></i> Город
                </div>
                <form id="geoForm">

                    
                    <div class="form-group">
                        <label>Место проживания</label>
                        <input type="text" class="form-control" placeholder="Москва" id="latInput" name="city">
                    </div>
                    <button type="submit" class="save-btn">ОБНОВИТЬ ГОРОД</button>
                </form>
            </div>

            <!-- БЛОК 2: СМЕНИТЬ ИМЯ -->
            <div class="setting-card">
                <div class="card-title">
                    <i class="fas fa-user-edit"></i> Личные данные
                </div>
                <form id="nameForm">
                    <div class="form-group">
                        <label>Новое имя</label>
                        <input type="text" class="form-control" placeholder="Введите новое имя" name="newName">
                    </div>
                    <button type="submit" class="save-btn">СОХРАНИТЬ ИМЯ</button>
                </form>
            </div>

            <!-- БЛОК 3: СМЕНИТЬ ПАРОЛЬ -->
            <div class="setting-card">
                <div class="card-title">
                    <i class="fas fa-key"></i> Безопасность
                </div>
                <form id="passForm">
                    <div class="form-group">
                        <label>Старый пароль</label>
                        <div class="password-wrapper">
                            <input type="password" class="form-control" placeholder="••••••••">
                            <button type="button" class="password-toggle" onclick="togglePass(this)"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Новый пароль</label>
                        <div class="password-wrapper">
                            <input type="password" class="form-control" placeholder="••••••••">
                            <button type="button" class="password-toggle" onclick="togglePass(this)"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <button type="submit" class="save-btn">СМЕНИТЬ ПАРОЛЬ</button>
                </form>
            </div>

            <!-- БЛОК 4: МЕСТО РАБОТЫ -->
            <div class="setting-card">
                <div class="card-title">
                    <i class="fas fa-briefcase"></i> Работа
                </div>
                <form id="workForm">
                    <div class="form-group">
                        <label>Компания</label>
                        <input type="text" class="form-control" placeholder="Название компании" name="work_location">
                    </div>
                    
                    <button type="submit" class="save-btn">СОХРАНИТЬ ДАННЫЕ</button>
                </form>
            </div>

        </div>
    </div>

<script src="/static/js/settings.js"></script>

</body>
</html>
